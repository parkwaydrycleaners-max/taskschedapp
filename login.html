<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secure Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0; 
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #efefef;
    font-family: Arial, sans-serif;
}

.login-box {
    background: white;
    padding: 30px;
    width: 360px;
    border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    text-align: center;
    transition: transform 0.15s;
}

/* ✨ SHAKE animation when password is wrong */
.shake {
    animation: shakeAnim 0.3s ease-in-out;
}

@keyframes shakeAnim {
    0% { transform: translateX(0); }
    20% { transform: translateX(-10px); }
    40% { transform: translateX(10px); }
    60% { transform: translateX(-8px); }
    80% { transform: translateX(8px); }
    100% { transform: translateX(0); }
}

h2 { margin: 0 0 10px 0; }

.input-wrap {
    position: relative;
    width: 100%;
}
input[type="password"],
input[type="text"] {
    padding: 12px;
    width: 100%;
    margin-top: 15px;
    border-radius: 6px;
    border: 1px solid #bbb;
    font-size: 1rem;
    box-sizing: border-box;
}

/* Eye toggle icon */
.toggle-eye {
    position: absolute;
    right: 12px;
    top: 25px;
    cursor: pointer;
    font-size: 18px;
    color: #666;
}

input:focus {
    border-color: #0a75ff;
    outline: none;
    box-shadow: 0 0 4px rgba(10,117,255,0.4);
}

button {
    margin-top: 20px;
    padding: 12px;
    width: 100%;
    background: #0a75ff;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 1rem;
    cursor: pointer;
}
button:hover { background: #005fe0; }

.cancel-btn {
    margin-top: 10px;
    background: #ddd;
    color: #333;
}
.cancel-btn:hover { background: #ccc; }

.error {
    margin-top: 10px;
    color: red;
    display:none;
}
</style>

</head>
<body>

<div class="login-box" id="loginBox">
    <h2>Top Cleaners Intranet</h2>
    <p>Please enter the password:</p>

    <div class="input-wrap">
        <input type="password" id="pwInput" placeholder="Password">
        <span class="toggle-eye" onclick="togglePassword()">👁️</span>
    </div>

    <button onclick="checkPassword()">Login</button>

    <button class="cancel-btn" onclick="window.location.href='https://626topcleaners.com'">
        Cancel
    </button>

    <div class="error" id="errorMsg">Password incorrect</div>
</div>

<script>
// Password = "mypassword123"
const correctHash = "8cad11cc10285aa0d88aa8c1d3c0a0a5a03923b625d05f6b1c38d5733630b215";

/* Hash function (SHA-256) */
async function hash(text) {
    const msg = new TextEncoder().encode(text);
    const buffer = await crypto.subtle.digest("SHA-256", msg);
    return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2,'0')).join('');
}

/* ✨ SHOW PASSWORD TOGGLE */
function togglePassword() {
    const pw = document.getElementById("pwInput");
    pw.type = (pw.type === "password") ? "text" : "password";
}

/* ✨ Login + Shake animation on wrong password */
async function checkPassword() {
    const input = document.getElementById("pwInput").value;
    const box = document.getElementById("loginBox");
    const inputHash = await hash(input);

    if (inputHash === correctHash) {
        sessionStorage.setItem("authorized", "yes");
        window.location.href = "index.html";
    } else {
        document.getElementById("errorMsg").style.display = "block";
        
        // Shake animation
        box.classList.remove("shake");
        void box.offsetWidth; // force reflow to restart animation
        box.classList.add("shake");
    }
}
</script>

</body>
</html>
